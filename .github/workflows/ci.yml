name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and test
        run: mvn clean verify

      - name: Upload test reports
        uses: actions/upload-artifact@v3.1.2
        with:
          name: test-reports
          path: target/surefire-reports/